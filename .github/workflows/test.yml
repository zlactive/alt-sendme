name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev
      - release

jobs:
  rust-e2e:
    name: Rust E2E Transfer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './engine -> target'
      # The root manifest only covers the `engine` package.
      - name: Run protocol and native unit tests
        run: cargo test --manifest-path engine/Cargo.toml -p sendme-protocol -p sendme-native
        timeout-minutes: 10
      - name: Run engine E2E tests
        run: cargo test --manifest-path engine/Cargo.toml -- --test-threads=1
        timeout-minutes: 10
