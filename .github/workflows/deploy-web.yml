name: Deploy Web

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy web app
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24.x'
          cache: pnpm

      - name: Set up Rust (WASM)
        uses: dtolnay/rust-toolchain@3056ad9b1fc916cb9a55f7f72ae4a848b7d50249
        with:
          targets: wasm32-unknown-unknown

      - name: Install clang for WASM (ring)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          pnpm pkg set version="$VERSION"
          pnpm run sync-version
          node scripts/validate-version.js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@54.21.0

      - name: Build and deploy to Vercel
        env:
          CC: clang
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: ./scripts/deploy-web-vercel.sh
