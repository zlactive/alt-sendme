name: 'build-debug-apk'

on:
  push:
    branches:
      - '**'

jobs:
  android-debug-apk:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 10.12.1

      - name: setup node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24.x'
          package-manager-cache: false

      - name: Set up Java
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699
        with:
          packages: build-tools;36.0.0 platform-tools platforms;android-36

      - name: Set up NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        with:
          ndk-version: r27c

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3056ad9b1fc916cb9a55f7f72ae4a848b7d50249
        with:
          components: rustfmt
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install WASM build dependencies
        run: |
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: './src-tauri -> target'
          key: ubuntu-22.04-android-cargo

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM bridge
        run: pnpm run build:wasm

      - name: Build frontend
        run: pnpm run build

      - name: Build Android debug APK
        shell: bash
        run: pnpm run android:build

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alt-sendme-debug-apks
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/build/**/*.apk
          if-no-files-found: warn
